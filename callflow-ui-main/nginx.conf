server {
    listen 80;

    # ── Backend API proxy ──────────────────────────────────────────────────────
    # All known FastAPI route prefixes get forwarded to the backend container.

    location /call/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location = /calls {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
    }

    location /calls/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
    }

    location /health {
        proxy_pass         http://backend:8000;
    }

    location /bulk/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        client_max_body_size 20m;   # allow Excel uploads
    }

    location /inbound/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /settings/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
    }

    location /signalwire/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /docs {
        proxy_pass         http://backend:8000;
    }

    location /redoc {
        proxy_pass         http://backend:8000;
    }

    location /openapi.json {
        proxy_pass         http://backend:8000;
    }

    # ── React SPA (catch-all) ──────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
