services:
  # ── Backend: FastAPI + LiveKit agent (via start.sh) ───────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      AUTO_START_AGENT: "false"   # start.sh starts the agent; don't double-spawn
      DATABASE_URL: "sqlite+aiosqlite:////app/data/calls.db"
    volumes:
      - calls_data:/app/data      # persistent SQLite database
    restart: unless-stopped
    # Not exposed externally — Nginx proxies to it

  # ── Frontend: React SPA + Nginx reverse proxy ─────────────────────────────
  frontend:
    build:
      context: ./callflow-ui-main
      dockerfile: Dockerfile
      args:
        # Public address the browser will reach this app at. Defaults to
        # localhost for running on your own machine. For a VPS/server
        # deployment, set VITE_API_BASE_URL in a root .env file (next to this
        # docker-compose.yml) to your server's public IP or domain, e.g.
        # VITE_API_BASE_URL=http://203.0.113.10
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost}"
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  calls_data:
