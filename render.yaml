services:
  # ── Backend: FastAPI + LiveKit agent worker ───────────────────────────────
  - type: web
    name: ai-voice-call-backend
    runtime: docker
    rootDir: backend
    plan: starter          # Starter ($7/mo) required for persistent disk
    healthCheckPath: /health
    disk:
      name: calls-db
      mountPath: /app/data
      sizeGB: 1
    envVars:
      # ── App ──
      - key: APP_HOST
        value: "0.0.0.0"
      - key: APP_PORT
        value: "8000"
      - key: APP_BASE_URL
        value: https://ai-voice-call-v1.onrender.com
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: AUTO_START_AGENT
        value: "false"
      # ── Database (absolute path so it lands on the persistent disk) ──
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////app/data/calls.db
      # ── SignalWire ──
      - key: SIGNALWIRE_PROJECT_ID
        sync: false
      - key: SIGNALWIRE_API_TOKEN
        sync: false
      - key: SIGNALWIRE_SPACE_URL
        sync: false
      - key: SIGNALWIRE_FROM_NUMBER
        sync: false
      # ── LiveKit ──
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_SIP_TRUNK_ID
        sync: false
      - key: LIVEKIT_SIP_URI
        sync: false
      # ── Deepgram ──
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: DEEPGRAM_MODEL
        value: nova-2
      - key: DEEPGRAM_LANGUAGE
        value: en-US
      # ── Groq ──
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      # ── ElevenLabs ──
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_MODEL_ID
        value: eleven_turbo_v2_5
      # ── Agent behavior ──
      - key: AGENT_SYSTEM_PROMPT
        sync: false
      - key: AGENT_INITIAL_GREETING
        sync: false
      - key: AGENT_VOICEMAIL_MESSAGE
        sync: false
      - key: MAX_CALL_DURATION_SECONDS
        value: "600"
      - key: AMD_TIMEOUT_SECONDS
        value: "30"

  # ── Frontend: React static site ───────────────────────────────────────────
  - type: web
    name: ai-voice-call-frontend
    runtime: static
    rootDir: callflow-ui-main
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false        # Fill in: https://ai-voice-call-backend.onrender.com
